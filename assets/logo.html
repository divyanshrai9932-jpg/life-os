<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 200px;
    height: 200px;
    overflow: hidden;
  }

  .logo {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #fdf6e3 0%, #fff8f0 50%, #f0fdf4 100%);
    border-radius: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Mini landscape */
  .mini-sky {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 100%;
    background: linear-gradient(180deg, #fef3c7 0%, #bae6fd 30%, #7dd3fc 50%, #7dd3fc 100%);
    border-radius: 40px;
  }

  .mini-hill-1 {
    position: absolute;
    top: 55px;
    left: -30px;
    width: 140px;
    height: 80px;
    background: #86efac;
    border-radius: 50%;
    opacity: 0.7;
  }

  .mini-hill-2 {
    position: absolute;
    top: 60px;
    right: -20px;
    width: 120px;
    height: 70px;
    background: #6ee7b7;
    border-radius: 50%;
    opacity: 0.6;
  }

  .mini-water {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    height: 20px;
    background: linear-gradient(180deg, #38bdf8, #0ea5e9);
    opacity: 0.4;
  }

  .mini-elements {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 90px;
  }

  .mini-elements span {
    position: absolute;
    font-size: 14px;
  }

  .me-1 { top: 15px; left: 30px; font-size: 12px; }
  .me-2 { top: 22px; right: 35px; font-size: 11px; }
  .me-3 { top: 48px; left: 15px; font-size: 16px; }
  .me-4 { top: 50px; right: 25px; font-size: 15px; }
  .me-5 { top: 45px; left: 85px; font-size: 13px; }

  .text {
    position: relative;
    z-index: 10;
    margin-top: 30px;
    text-align: center;
  }

  .text-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 38px;
    color: #1a1a1a;
    letter-spacing: -1px;
    line-height: 1;
  }

  .text-sub {
    font-family: -apple-system, sans-serif;
    font-size: 11px;
    color: #6b7280;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  .texture {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000000' fill-opacity='0.015'%3E%3Cpath d='M5 0h1L0 6V5zM6 5v1H5z'/%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    border-radius: 40px;
  }
</style>
</head>
<body>
  <div class="logo">
    <div class="mini-sky"></div>
    <div class="mini-hill-1"></div>
    <div class="mini-hill-2"></div>
    <div class="mini-water"></div>

    <div class="mini-elements">
      <span class="me-1">&#x1F54A;&#xFE0F;</span>
      <span class="me-2">&#x1F98B;</span>
      <span class="me-3">&#x1F332;</span>
      <span class="me-4">&#x1F333;</span>
      <span class="me-5">&#x1F33C;</span>
    </div>

    <div class="texture"></div>

    <div class="text">
      <div class="text-title">Life OS</div>
      <div class="text-sub">documented by Claude</div>
    </div>
  </div>
</body>
</html>
